name: Deploy to Azure App Service

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }} # set in repo Variables
  AZURE_WEBAPP_PACKAGE_PATH: "deploy"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js standalone output)
        run: npm run build

      # Assemble the standalone bundle App Service will run.
      #   .next/standalone        -> server.js + minimal node_modules
      #   .next/static            -> hashed static assets (must sit at .next/static)
      #   public                  -> public assets
      - name: Assemble deploy package
        run: |
          mkdir -p ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          cp -R .next/standalone/. ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/
          mkdir -p ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/.next
          cp -R .next/static ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/.next/static
          if [ -d public ]; then cp -R public ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/public; fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
